server:
  port: 8084
  servlet:
    encoding:
      # ✅ HTTP 요청/응답 인코딩 (브라우저/PowerShell 한글 깨짐 방지)
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/goosage?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: goosage
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      # ✅ (선택) 커넥션 잡자마자 인코딩을 utf8mb4로 통일
      connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci"

  jpa:
    hibernate:
      # ✅ 개발 단계 옵션
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    # ✅ Flyway 마이그레이션 활성화
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  debug: true

# ✅ 여기부터는 spring 바깥 (최상단)
logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
