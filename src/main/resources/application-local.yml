server:
  port: 8084
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    # ✅ 세션은 쿠키로만 추적(명시)
    session:
      tracking-modes: cookie
  # ✅ 응답 헤더 확인용(개발에서만)
  error:
    include-message: always
    include-binding-errors: always
    include-exception: true
    include-stacktrace: always

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/goosage?serverTimezone=Asia/Seoul
    username: goosage
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ✅ 개발 디버그
debug: true

logging:
  level:
    org.flywaydb: INFO
    org.springframework.boot.autoconfigure.flyway: INFO

    # ✅ 요청/응답 흐름, 매핑, 세션/쿠키 진단에 도움
    org.springframework.web: DEBUG
    org.springframework.web.servlet.DispatcherServlet: DEBUG
    org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping: TRACE

    # ✅ 세션/쿠키가 실제로 붙는지(필터 레벨 확인용)
    org.springframework.session: DEBUG

    # ✅ 스프링 시큐리티를 쓴다면(안 쓰면 무시됨)
    org.springframework.security: DEBUG

    # ✅ 톰캣 세션 처리 로그(세션 생성/쿠키)
    org.apache.catalina.session: DEBUG
