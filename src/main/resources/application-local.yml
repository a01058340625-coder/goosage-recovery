spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/goosage_local?serverTimezone=Asia/Seoul
    username: goosage
    password: 1234
    hikari:
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci

server:
  port: 8084
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    session:
      tracking-modes: cookie
  error:
    include-message: always
    include-binding-errors: always
    include-exception: true
    include-stacktrace: always
