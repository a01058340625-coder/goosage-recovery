server:
  port: 60761
  servlet:
    encoding:
      # ✅ HTTP 요청/응답 인코딩 (브라우저/PowerShell에서 한글 깨짐 방지)
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    # ✅ (중요) 로컬 DB 연결 문자열
    # - useUnicode=true: 유니코드 사용
    # - characterEncoding=utf8: 드라이버 문자 인코딩 (내부적으로 utf8mb4와 잘 동작)
    # - connectionCollation=utf8mb4_0900_ai_ci: 연결 콜레이션
    # - serverTimezone=Asia/Seoul: 시간대
    url: ${DB_URL}

    # ✅ (중요) 계정/비번을 yml에 박지 말고 환경변수로 받는다
    username: ${DB_USER}
    password: ${DB_PASS}

    # ✅ MySQL 8 드라이버
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      # ✅ (선택) 커넥션 잡자마자 인코딩을 utf8mb4로 통일하는 안전장치
      # - DB/테이블/컬럼이 utf8mb4로 세팅돼 있으면 굳이 없어도 됨
      connection-init-sql: "SET NAMES utf8mb4 COLLATE utf8mb4_0900_ai_ci"

  jpa:
    hibernate:
      # ✅ 개발 단계 옵션
      # - update: 엔티티 변경을 DB에 반영하려고 시도 (편하지만 운영에선 위험)
      # - 운영(edge)에서는 되도록 none 또는 validate 권장
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  flyway:
    # ✅ Flyway 마이그레이션 활성화
    # - db/migration 아래 SQL 버전관리 시작
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    # ✅ JPA ddl-auto=update와 Flyway를 같이 쓰면 “관리 주체가 2개”가 됨
    # - 지금은 학습/전환기니까 같이 둬도 되지만,
    # - 최종적으로는 Flyway로만 관리하는 걸 추천
  debug: true
# ✅ 여기부터는 spring 바깥(최상단)
logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
    

